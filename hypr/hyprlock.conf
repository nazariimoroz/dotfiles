background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 80
    font_family = JetBrains Mono Bold
    color = rgba(255, 255, 255, 0.9)
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    font_size = 20
    font_family = JetBrains Mono
    color = rgba(255, 255, 255, 0.6)
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.64
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(255, 255, 255)
    font_family = JetBrains Mono
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    check_color = rgb(33, 204, 255)
    fail_color = rgb(255, 80, 80)
    fail_text = <i>Wrong password ($ATTEMPTS)</i>
    position = 0, -20
    halign = center
    valign = center
}
