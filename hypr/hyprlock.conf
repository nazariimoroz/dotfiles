# Colors + font mirrored from wofi (Catppuccin Mocha, see ~/.config/wofi/style.css)
# crust #11111b | text #cdd6f4 | subtext0 #a6adc8 | mauve #cba6f7
# accent/dark-lavender #8087d6 | surface0 #313244 | red #f38ba8 | green #a6e3a1
# Font: CommitMono Nerd Font Bold. Square style — no rounding, 2px accent border.

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 80
    font_family = CommitMono Nerd Font Bold
    color = rgb(cdd6f4)
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    font_size = 20
    font_family = CommitMono Nerd Font Bold
    color = rgb(a6adc8)
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    rounding = 0
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.64
    outer_color = rgb(8087d6)
    inner_color = rgb(313244)
    font_color = rgb(cdd6f4)
    font_family = CommitMono Nerd Font Bold
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>Wrong password ($ATTEMPTS)</i>
    position = 0, -20
    halign = center
    valign = center
}
